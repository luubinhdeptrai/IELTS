<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Task Manager</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --accent: #0ea5e9;
            --accent-hover: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Create Task Form */
        .create-form {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(6, 182, 212, 0.3);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--bg-card);
            padding: 0.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .filter-tab {
            flex: 1;
            padding: 0.75rem 1rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--accent);
            color: white;
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .task-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-TODO {
            background: rgba(14, 165, 233, 0.1);
            color: #0284c7;
        }

        .status-DOING {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-DONE {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-icon:hover {
            background: var(--accent);
            color: white;
        }

        .btn-icon.danger:hover {
            background: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Task Manager</h1>
            <p class="subtitle">Clean Architecture Demo</p>
        </header>

        <!-- Create Task Form -->
        <div class="create-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="title">Task Title *</label>
                    <input type="text" id="title" placeholder="What needs to be done?">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Add some details (optional)"></textarea>
                </div>
            </div>
            <button class="btn btn-primary" onclick="createTask()">+ Add Task</button>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="" onclick="filterTasks(this, '')">All</button>
            <button class="filter-tab" data-status="TODO" onclick="filterTasks(this, 'TODO')">📋 TODO</button>
            <button class="filter-tab" data-status="DOING" onclick="filterTasks(this, 'DOING')">⚡ DOING</button>
            <button class="filter-tab" data-status="DONE" onclick="filterTasks(this, 'DONE')">✅ DONE</button>
        </div>

        <!-- Task List -->
        <div class="task-list" id="taskList">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <p>No tasks yet. Create your first one!</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '/tasks';
        let currentFilter = '';

        // Fetch and display tasks
        async function loadTasks() {
            try {
                const url = currentFilter ? `${API_URL}?status=${currentFilter}` : API_URL;
                const response = await fetch(url);
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                showToast('Failed to load tasks', 'error');
            }
        }

        // Render tasks to DOM
        function renderTasks(tasks) {
            const container = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>No tasks found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-card" data-id="${task.id}">
                    <div class="task-content">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                        <div class="task-meta">
                            <span class="status-badge status-${task.status}">${task.status}</span>
                            &nbsp;•&nbsp; Created ${formatDate(task.createdAt)}
                        </div>
                    </div>
                    <div class="task-actions">
                        ${getStatusButtons(task)}
                        <button class="btn-icon danger" onclick="deleteTask('${task.id}')" title="Delete">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Get appropriate status transition buttons
        function getStatusButtons(task) {
            switch(task.status) {
                case 'TODO':
                    return `<button class="btn-icon" onclick="updateStatus('${task.id}', 'DOING')" title="Start">▶️</button>`;
                case 'DOING':
                    return `
                        <button class="btn-icon" onclick="updateStatus('${task.id}', 'TODO')" title="Back to TODO">⏪</button>
                        <button class="btn-icon" onclick="updateStatus('${task.id}', 'DONE')" title="Complete">✅</button>
                    `;
                case 'DONE':
                    return `<button class="btn-icon" onclick="updateStatus('${task.id}', 'DOING')" title="Reopen">🔄</button>`;
                default:
                    return '';
            }
        }

        // Create new task
        async function createTask() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();

            if (!title) {
                showToast('Title is required', 'error');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                showToast('Task created!', 'success');
                loadTasks();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Update task status
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_URL}/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                showToast(`Status updated to ${newStatus}`, 'success');
                loadTasks();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Delete task
        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                showToast('Task deleted', 'success');
                loadTasks();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Filter tasks by status
        function filterTasks(btn, status) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = status;
            loadTasks();
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Helper: Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // Helper: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to submit
        document.getElementById('title').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createTask();
        });

        // Load tasks on page load
        loadTasks();
    </script>
</body>
</html>
